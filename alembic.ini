[alembic]
script_location = orion/db/migrations
prepend_sys_path = .
sqlalchemy.url = postgresql+asyncpg://neondb_owner:npg_on5LBvTYF3lS@ep-fragrant-shadow-a4gckauw-pooler.us-east-1.aws.neon.tech/neondb?ssl=require

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
